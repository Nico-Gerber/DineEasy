<head>
    <meta charset="utf-8">
    <meta name="description" content="Web development">
    <meta name="keywords" content="HTML, web development, forms, input elements, COS10005, Nico Gerber">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">


</head>

<body>


    <!-- NAV -->

    <header>


        <nav id="main-nav">

            <a href="index.html" id="logo-item">
                <img id="logo" src="images/logo.png" alt="DineEasy logo">
            </a>

            <ul id="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="restaurants.html">Restaurants</a></li>
                <li><a href="recommend.html">Recommendation</a></li>
                <li><a class="current-page" href="register.html">Register</a></li>
                <li><a href="reservation.html">Reservation</a></li>
            </ul>

        </nav>

    </header>

    <main>





        <br><br>


        <!-- FORM -->



        <form id="regform" class="register-form" action="http://mercury.swin.edu.au/it000000/cos10005/regtest.php"
            method="post">
            <div class="form-wrapper">

                <div id="reg-title">

                    <h1>Register Now!</h1>

                    <p>Join DineEasy to reserve restaurants faster.</p>


                </div>


                <!--   USERNAME   -->

                <div class="field">

                    <label for="username">Username</label>
                    <input type="text" id="username" name="username">
                    <div class="field-error" id="username-error"></div>

                </div>

                <!--   EMAIL   -->

                <div class="field">
                    <label for="email">Email Adress</label>
                    <input type="text" id="email" name="email">
                    <div class="field-error" id="email-error"></div>

                </div>

                <!--   PHONE NUMBER   -->

                <div class="field">
                    <label for="phonenumber">Phone Number</label>
                    <input type="tel" id="phonenumber" name="phonenumber">
                    <div class="field-error" id="phone-error"></div>

                </div>


                <!--   PASSWORD   -->

                <div class="field">

                    <div class="password-section">

                        <div class="stack-label">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password">
                        </div>

                        <div class="stack-label">
                            <label for="confirmpassword">Confirm Password</label>
                            <input type="password" id="confirmpassword" name="confirmpassword">
                        </div>


                    </div>

                </div>

                <div class="field-error" id="password-error"></div>

                <!--   GENDER   -->

                <div class="field">
                    <p>Gender</p>

                    <div class="radio-options">

                        <label for="male"><input type="radio" id="male" name="gender" value="male">Male</label>
                        <label for="female"><input type="radio" id="female" name="gender" value="female">Female</label>
                        <label for="other"><input type="radio" id="other" name="gender" value="other">
                            Other</label>


                    </div>

                </div>

                <div class="field-error" id="gender-error"></div>

                <!--   DIETARY PREFERENCES   -->

                <div class="field">



                    <p>Dietary Preferences</p>



                    <div class="check-options">

                        <label for="none"><input type="checkbox" id="none" name="dietary-preferences"
                                value="none">None</label>
                        <label for="vegetarian"><input type="checkbox" id="vegetarian" name="dietary-preferences"
                                value="vegetarian">Vegetarian</label>
                        <label for="vegan"><input type="checkbox" id="vegan" name="dietary-preferences" value="vegan">
                            Vegan</label>
                        <label for="gluten-free"><input type="checkbox" id="gluten-free" name="dietary-preferences"
                                value="gluten-free"> Gluten Free</label>
                        <label for="Halal"><input type="checkbox" id="Halal" name="dietary-preferences"
                                value="Halal">Halal</label>
                        <label for="Kosher"><input type="checkbox" id="Kosher" name="dietary-preferences"
                                value="Kosher">Kosher</label>


                    </div>

                </div>

                <div class="field-error" id="diet-error"></div>

                <!--   COUNTRY/REGION   -->

                <div class="field">

                    <label for="country">Country/Region</label>

                    <select name="country" id="country">
                        <option value="australia">Australia</option>
                        <option value="canada">Canada</option>
                        <option value="USA">USA</option>
                        <option value="spain">Spain</option>
                    </select>
                </div>

            </div>



            <button id="submit-form" type="submit">Submit</button>


        </form>



    </main>



    <!-- FOOTER -->


    <footer id="main-footer">

        <div class="footer-bottom">
            <p>&copy; 2026 DineEasy. All rights reserved.</p>
        </div>

    </footer>

    <script src="js/script.js"></script>

</body>



</html>
